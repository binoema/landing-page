<header class="sticky top-0 z-40 border-b border-[var(--nier-border)] bg-[var(--nier-bg-panel)]/90 backdrop-blur-sm">
  <section class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a
      routerLink="/"
      class="group flex items-center gap-3 no-underline"
      (click)="closeMenu()"
    >
      <span class="nier-avatar h-10 w-10 text-sm" aria-hidden="true">
        {{ profile().avatarInitials }}
      </span>
      <span class="hidden sm:block">
        <span
          class="block font-[family-name:var(--font-display)] text-sm font-medium tracking-widest text-[var(--nier-accent-bright)] group-hover:text-[var(--nier-accent)]"
        >
          {{ profile().name }}
        </span>
        <span class="nier-label !text-[0.6rem] !tracking-[0.18em]">Portfolio</span>
      </span>
    </a>

    <nav class="hidden items-center gap-1 md:flex" aria-label="Main">
      @for (link of navLinks(); track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="nier-link--active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="nier-link px-3 py-2"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="nier-btn nier-btn--danger hidden text-[0.65rem] sm:inline-flex"
        [attr.aria-pressed]="glitch.infected()"
        (click)="toggleVirus()"
      >
        {{ glitch.infected() ? '[ PURGE ]' : '[ INJECT LOGIC VIRUS ]' }}
      </button>

      <button
        type="button"
        class="nier-btn !p-2 md:hidden"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-nav"
        (click)="toggleMenu()"
      >
        <span class="sr-only">Toggle menu</span>
        @if (menuOpen()) {
          <span aria-hidden="true">[ X ]</span>
        } @else {
          <span aria-hidden="true">[ ≡ ]</span>
        }
      </button>
    </div>
  </section>

  @if (menuOpen()) {
    <nav
      id="mobile-nav"
      class="border-t border-[var(--nier-border)] px-4 py-3 md:hidden"
      aria-label="Mobile"
    >
      <div class="mb-3">
        <button
          type="button"
          class="nier-btn nier-btn--danger w-full justify-center text-[0.65rem]"
          [attr.aria-pressed]="glitch.infected()"
          (click)="toggleVirus()"
        >
          {{ glitch.infected() ? '[ PURGE VIRUS ]' : '[ INJECT VIRUS ]' }}
        </button>
      </div>
      <div class="flex flex-col gap-1">
        @for (link of navLinks(); track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="nier-link--active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="nier-link px-3 py-2"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </nav>
  }
</header>
