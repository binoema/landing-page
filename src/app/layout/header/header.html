<header class="sticky top-0 z-50 border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-md">
  <section class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <a
      routerLink="/"
      class="group flex items-center gap-3 no-underline"
      (click)="closeMenu()"
    >
      <span
        class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-600 text-sm font-bold text-white shadow-lg shadow-violet-500/20"
        aria-hidden="true"
      >
        {{ profile().avatarInitials }}
      </span>
      <span class="hidden sm:block">
        <span class="block text-sm font-semibold text-white group-hover:text-violet-200">
          {{ profile().name }}
        </span>
        <span class="block text-xs text-slate-400">Portfolio</span>
      </span>
    </a>

    <nav class="hidden items-center gap-1 md:flex" aria-label="Main">
      @for (link of navLinks(); track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-slate-800 text-white"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-300 no-underline transition hover:bg-slate-800/60 hover:text-white"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <button
      type="button"
      class="inline-flex items-center justify-center rounded-lg border border-slate-700 p-2 text-slate-300 md:hidden"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-nav"
      (click)="toggleMenu()"
    >
      <span class="sr-only">Toggle menu</span>
      @if (menuOpen()) {
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      }
    </button>
  </section>

  @if (menuOpen()) {
    <nav
      id="mobile-nav"
      class="border-t border-slate-800 px-4 py-3 md:hidden"
      aria-label="Mobile"
    >
      <div class="flex flex-col gap-1">
        @for (link of navLinks(); track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-slate-800 text-white"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="rounded-lg px-3 py-2 text-sm font-medium text-slate-300 no-underline"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </nav>
  }
</header>
