<a
  [routerLink]="['/skills', skill().id]"
  class="skill-card nier-panel group relative flex h-full flex-col overflow-hidden p-6 no-underline"
>
  <span class="skill-card__scan" aria-hidden="true"></span>
  <span class="skill-card__corner skill-card__corner--tl" aria-hidden="true"></span>
  <span class="skill-card__corner skill-card__corner--br" aria-hidden="true"></span>

  <div class="relative z-10 flex h-full flex-col">
    <p class="nier-label mb-3 !text-[0.6rem]">Module</p>
    <div class="skill-card__icon mb-4" aria-hidden="true">
      <app-fa-icon [icon]="skill().icon" [accentClass]="skill().accentClass" size="lg" />
    </div>

    <h3 class="skill-card__title nier-heading mb-2 text-lg">
      {{ skill().name }}
    </h3>
    <p class="skill-card__tagline mb-4 flex-1 text-sm leading-relaxed text-[var(--nier-text-muted)]">
      {{ skill().tagline }}
    </p>
    <span class="skill-card__cta nier-label !text-[0.65rem]">[ Initialize ]</span>
  </div>
</a>
